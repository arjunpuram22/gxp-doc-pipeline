# Role for the doc-generator service itself
# Principle of least privilege - only what the service needs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: doc-generator-role
  namespace: gxp-doc
  labels:
    compliance: gxp
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: []  # No secret access - secrets come from AWS Secrets Manager

---
# Role for compliance auditors - read only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: audit-reader-role
  namespace: gxp-doc
  labels:
    compliance: gxp
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]

---
# Role for developers - deploy and manage but cannot delete namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer-role
  namespace: gxp-doc
  labels:
    compliance: gxp
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

---
# Bind the doc-generator service account to its role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: doc-generator-rolebinding
  namespace: gxp-doc
  labels:
    compliance: gxp
subjects:
  - kind: ServiceAccount
    name: doc-generator-sa
    namespace: gxp-doc
roleRef:
  kind: Role
  name: doc-generator-role
  apiGroup: rbac.authorization.k8s.io
