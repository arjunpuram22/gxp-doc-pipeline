apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gxp-doc-pipeline
  namespace: argocd
  labels:
    compliance: gxp
    project: gxp-doc-pipeline
spec:
  project: default
  source:
    repoURL: https://github.com/arjunpuram22/gxp-doc-pipeline.git
    targetRevision: HEAD
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: gxp-doc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
